<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>我的个人网站</title>
  <meta name="description" content="这是我的个人网站，展示我的介绍、作品和联系方式。" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f7f7f8;
      color: #222;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #111827, #374151);
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
    }

    header p {
      margin-top: 12px;
      font-size: 18px;
      color: #e5e7eb;
    }

    nav {
      background: white;
      padding: 12px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      border-bottom: 1px solid #e5e7eb;
    }

    nav a {
      color: #111827;
      text-decoration: none;
      margin: 0 10px;
      font-weight: 600;
    }

    section {
      max-width: 900px;
      margin: 30px auto;
      padding: 30px 20px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    h2 {
      margin-top: 0;
      font-size: 26px;
      color: #111827;
    }

    .works {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .work-card {
      padding: 18px;
      background: #f3f4f6;
      border-radius: 12px;
    }

    .work-card h3 {
      margin-top: 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      padding: 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #374151;
    }

    footer {
      text-align: center;
      color: #6b7280;
      padding: 30px 20px;
      font-size: 14px;
    }

    @media (min-width: 700px) {
      .works {
        grid-template-columns: repeat(3, 1fr);
      }

      header h1 {
        font-size: 48px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>你好，我是你的名字</h1>
    <p>这里是我的个人网站，我会在这里展示我的作品、经历和想法。</p>
  </header>

  <nav>
    <a href="#about">关于我</a>
    <a href="#works">作品</a>
    <a href="#contact">联系</a>
  </nav>

  <section id="about">
    <h2>关于我</h2>
    <p>
      你好，我是一个正在学习用 AI 搭建网站的人。这个网站是我用手机和 AI 辅助完成的第一个个人网站。
    </p>
    <p>
